<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-rad" cx="22%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#0b1228"/>
      <stop offset="55%" stop-color="#050a18"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="gp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00f3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gk" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff00ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ff00ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.32"/>
    </pattern>
    <filter id="tg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.6" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="h"/>
      <feMerge><feMergeNode in="h"/><feMergeNode in="h"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bg2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
      <feFlood flood-color="#00f3ff" flood-opacity="0.65" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="h"/>
      <feMerge><feMergeNode in="h"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ng" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5" result="b"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.95" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="h"/>
      <feMerge><feMergeNode in="h"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg-rad)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="160" cy="120" rx="420" ry="280" fill="url(#gp)"/>
  <ellipse cx="1060" cy="560" rx="380" ry="260" fill="url(#gb)"/>
  <ellipse cx="990" cy="120" rx="260" ry="200" fill="url(#gk)"/>

  <!-- Neural network constellation (right, AI motif) -->
  <g stroke="#8b5cf6" stroke-width="1.4" opacity="0.5" fill="none">
    <line x1="830" y1="180" x2="960" y2="120"/>
    <line x1="960" y1="120" x2="1090" y2="210"/>
    <line x1="830" y1="180" x2="905" y2="310"/>
    <line x1="905" y1="310" x2="1090" y2="210"/>
    <line x1="905" y1="310" x2="1015" y2="430"/>
    <line x1="1090" y1="210" x2="1015" y2="430"/>
    <line x1="1015" y1="430" x2="1130" y2="510"/>
    <line x1="905" y1="310" x2="820" y2="430"/>
    <line x1="820" y1="430" x2="1015" y2="430"/>
  </g>
  <g filter="url(#ng)">
    <circle cx="830" cy="180" r="6" fill="#8b5cf6"/>
    <circle cx="960" cy="120" r="7" fill="#c4b5fd"/>
    <circle cx="1090" cy="210" r="6" fill="#8b5cf6"/>
    <circle cx="905" cy="310" r="8" fill="#00f3ff"/>
    <circle cx="1015" cy="430" r="6" fill="#8b5cf6"/>
    <circle cx="1130" cy="510" r="5" fill="#c4b5fd"/>
    <circle cx="820" cy="430" r="5" fill="#8b5cf6"/>
  </g>

  <!-- Left accent bar -->
  <rect x="80" y="120" width="4" height="380" rx="2" fill="#8b5cf6" opacity="0.8" filter="url(#ng)"/>

  <!-- Category label (fuchsia-400 per site) -->
  <text x="110" y="165" font-family="'DejaVu Sans', Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#e879f9" filter="url(#bg2)">PORTFOLIO</text>

  <!-- Name -->
  <text x="108" y="300" font-family="'DejaVu Sans', Arial, sans-serif" font-size="108" font-weight="700" fill="#f8fafc" filter="url(#tg)">Kenneth Wan</text>

  <!-- Role (neon-blue) -->
  <text x="110" y="370" font-family="'DejaVu Sans', Arial, sans-serif" font-size="44" font-weight="600" fill="#00f3ff" filter="url(#bg2)">Data Scientist &amp; AI Engineer</text>

  <!-- Headline -->
  <text x="110" y="445" font-family="'DejaVu Sans', Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Turning data into meaningful insights through</text>
  <text x="110" y="485" font-family="'DejaVu Sans', Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">AI, LLMs, and optimization.</text>

  <!-- Bottom location tag -->
  <g transform="translate(110,540)">
    <circle cx="6" cy="0" r="4" fill="#0aff00" filter="url(#ng)"/>
    <text x="22" y="7" font-family="'DejaVu Sans', Arial, sans-serif" font-size="22" font-weight="400" fill="#64748b">Hong Kong</text>
  </g>
</svg>
