<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg-grad" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#050a18"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.95" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="halo"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="core-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Opaque dark slate background (apple-touch-icon safe) -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bg-grad)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" ry="13.5" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- K monogram: purple glow halo + bright core -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Purple neon halo -->
    <g filter="url(#glow)" stroke="#8b5cf6" stroke-width="9">
      <path d="M20 12 L20 52"/>
      <path d="M20 33 L47 11"/>
      <path d="M20 33 L47 53"/>
    </g>
    <!-- Bright core -->
    <g filter="url(#core-glow)" stroke="#e9d5ff" stroke-width="3">
      <path d="M20 12 L20 52"/>
      <path d="M20 33 L47 11"/>
      <path d="M20 33 L47 53"/>
    </g>
  </g>
</svg>
